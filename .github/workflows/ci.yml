name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run typecheck

      - name: Test
        run: npm run test:coverage

      # dist/ is committed so jsDelivr can serve it. Rebuild and fail if the
      # committed output drifts from a fresh build (i.e. someone forgot to
      # rebuild after editing src/).
      - name: Verify committed dist/ is up to date
        run: |
          npm run build
          if ! git diff --quiet -- dist; then
            echo "::error::dist/ is out of date. Run 'npm run build' and commit the result."
            git --no-pager diff --stat -- dist
            exit 1
          fi

  # Browser end-to-end tests that drive the example pages against a real
  # Chromium. Runs inside the official Playwright Docker image, which bundles
  # the browsers and their OS dependencies (mirrors `npm run test:e2e:docker`
  # locally). Keep the image tag in sync with @playwright/test in package.json.
  e2e:
    name: E2E (examples) in Docker
    needs: build
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.60.0-jammy
    steps:
      - uses: actions/checkout@v7

      - name: Install dependencies
        run: npm ci

      - name: Build local ESM bundle (manual-test.html imports ../dist)
        run: npm run build

      - name: Run Playwright e2e against the example pages
        run: npx playwright test

      - name: Upload Playwright report on failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
