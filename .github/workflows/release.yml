name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Semver bump for this release'
        type: choice
        required: true
        default: patch
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint & type-check
        run: |
          npm run lint
          npm run typecheck

      - name: Bump version
        id: bump
        run: |
          npm version "${{ github.event.inputs.bump }}" --no-git-tag-version
          VERSION="$(node -p "require('./package.json').version")"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build
        run: |
          npm run clean
          npm run build

      # Keep the jsDelivr CDN pins (README + the example) on the version being
      # released, in the SAME commit that gets tagged (jsDelivr serves these
      # files from the tag, so a lagging pin ships an inconsistent reference).
      - name: Bump CDN references
        env:
          VERSION: ${{ steps.bump.outputs.version }}
        run: |
          # The only @<semver> tokens in these files are the jsDelivr CDN pins.
          sed -i -E "s#@[0-9]+\.[0-9]+\.[0-9]+#@${VERSION}#g" README.md examples/index.html
          for f in README.md examples/index.html; do
            if ! grep -q "catas_altas_speech@${VERSION}/dist/esm/index.js" "$f"; then
              echo "::error::CDN reference in ${f} was not updated to ${VERSION}"
              exit 1
            fi
          done

      - name: Commit, tag & push
        env:
          VERSION: ${{ steps.bump.outputs.version }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json dist README.md examples/index.html
          git commit -m "build: ${VERSION}"
          # Tag convention: plain semver, no leading "v" (jsDelivr URLs pin @<version>).
          git tag -a "${VERSION}" -m "Release ${VERSION}"
          git push origin HEAD
          git push origin "${VERSION}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.bump.outputs.version }}
        run: gh release create "${VERSION}" --title "${VERSION}" --generate-notes

      - name: Purge jsDelivr cache
        env:
          VERSION: ${{ steps.bump.outputs.version }}
        run: |
          base="https://purge.jsdelivr.net/gh/mpbarbosa/catas_altas_speech"
          # New tag is never cached yet; @latest alias is, so purge it (and the
          # freshly tagged path for good measure).
          for ref in "@${VERSION}" "@latest"; do
            curl -fsSL "${base}${ref}/dist/esm/index.js" || echo "purge of ${ref} failed (non-fatal)"
          done
