name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Semver bump for this release'
        type: choice
        required: true
        default: patch
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint & type-check
        run: |
          npm run lint
          npm run typecheck

      - name: Bump version
        id: bump
        run: |
          npm version "${{ github.event.inputs.bump }}" --no-git-tag-version
          VERSION="$(node -p "require('./package.json').version")"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build
        run: |
          npm run clean
          npm run build

      # Keep the README's jsDelivr examples pinned to the version being released,
      # in the SAME commit that gets tagged (jsDelivr serves README from the tag).
      - name: Bump README CDN references
        env:
          VERSION: ${{ steps.bump.outputs.version }}
        run: |
          # The only @<semver> tokens in README.md are the two CDN pins
          # (the import URL and the "Pin a tag (`@x.y.z`)" note).
          sed -i -E "s#@[0-9]+\.[0-9]+\.[0-9]+#@${VERSION}#g" README.md
          if ! grep -q "catas_altas_speech@${VERSION}/dist/esm/index.js" README.md; then
            echo "::error::README CDN reference was not updated to ${VERSION}"
            exit 1
          fi

      - name: Commit, tag & push
        env:
          VERSION: ${{ steps.bump.outputs.version }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json dist README.md
          git commit -m "build: ${VERSION}"
          # Tag convention: plain semver, no leading "v" (jsDelivr URLs pin @<version>).
          git tag -a "${VERSION}" -m "Release ${VERSION}"
          git push origin HEAD
          git push origin "${VERSION}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.bump.outputs.version }}
        run: gh release create "${VERSION}" --title "${VERSION}" --generate-notes

      - name: Purge jsDelivr cache
        env:
          VERSION: ${{ steps.bump.outputs.version }}
        run: |
          base="https://purge.jsdelivr.net/gh/mpbarbosa/catas_altas_speech"
          # New tag is never cached yet; @latest alias is, so purge it (and the
          # freshly tagged path for good measure).
          for ref in "@${VERSION}" "@latest"; do
            curl -fsSL "${base}${ref}/dist/esm/index.js" || echo "purge of ${ref} failed (non-fatal)"
          done
